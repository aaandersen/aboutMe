<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 130" role="img" aria-label="Cloud infrastructure">
  <defs>
    <linearGradient id="c-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#082138"/>
      <stop offset="1" stop-color="#0c5a86"/>
    </linearGradient>
  </defs>
  <rect width="400" height="130" fill="url(#c-bg)"/>
  <!-- network / infrastructure nodes -->
  <g stroke="#7dd3fc" stroke-opacity="0.45" stroke-width="1.5">
    <line x1="74" y1="100" x2="150" y2="86"/>
    <line x1="250" y1="86" x2="330" y2="100"/>
    <line x1="150" y1="86" x2="250" y2="86"/>
  </g>
  <g fill="#7dd3fc">
    <circle cx="74" cy="100" r="4"/>
    <circle cx="200" cy="104" r="4"/>
    <circle cx="330" cy="100" r="4"/>
  </g>
  <!-- cloud -->
  <g fill="#ffffff" fill-opacity="0.96">
    <ellipse cx="205" cy="72" rx="62" ry="20"/>
    <circle cx="175" cy="62" r="19"/>
    <circle cx="208" cy="50" r="26"/>
    <circle cx="240" cy="63" r="17"/>
  </g>
</svg>
